<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Industrial - Ordens de Serviço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }, brand: '#3b82f6' }, fontSize: { 'xxs': '0.65rem' } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .kanban-col { min-height: 65vh; }
        .swal2-input, .swal2-select { width: 85% !important; margin: 10px auto !important; border-color: #334155 !important; color: #cbd5e1 !important; border-radius: 6px !important;}
        .swal2-input:focus, .swal2-select:focus { border-color: #3b82f6 !important; box-shadow: none !important; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-300 font-sans h-screen flex overflow-hidden text-sm">

    <aside class="w-64 bg-dark-800 border-r border-dark-700 flex flex-col z-20 shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-dark-700 bg-dark-900/50">
            <i class="fas fa-layer-group text-brand text-xl"></i>
            <span class="ml-3 font-bold text-lg text-white tracking-wider">NEXUS<span class="font-light text-slate-400">MGMT</span></span>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest mb-3 px-2">Análise Estratégica</p>
            <nav class="space-y-1 mb-6">
                <a href="index.html" class="flex items-center px-3 py-2 text-slate-400 hover:bg-dark-700 hover:text-white rounded-md transition-colors">
                    <i class="fas fa-chart-line w-5"></i><span class="ml-2">Dashboard Geral</span>
                </a>
            </nav>

            <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest mb-3 px-2">Gestão Operacional</p>
            <nav class="space-y-1">
                <a href="ativos.html" class="flex items-center px-3 py-2 text-slate-400 hover:bg-dark-700 hover:text-white rounded-md transition-colors">
                    <i class="fas fa-server w-5"></i><span class="ml-2">Parque de Ativos</span>
                </a>
                <a href="os.html" class="flex items-center px-3 py-2 bg-brand/10 text-brand rounded-md border-l-2 border-brand font-medium">
                    <i class="fas fa-clipboard-list w-5"></i><span class="ml-2">Ordens de Serviço</span>
                </a>
                <a href="estoque.html" class="flex items-center px-3 py-2 text-slate-400 hover:bg-dark-700 hover:text-white rounded-md transition-colors">
                    <i class="fas fa-boxes w-5"></i><span class="ml-2">Estoque e MRO</span>
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-dark-700 bg-dark-900/30">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div id="user-photo" class="w-8 h-8 rounded bg-brand flex items-center justify-center font-bold text-white overflow-hidden">
                        <i class="fas fa-spinner fa-spin text-xs"></i>
                    </div>
                    <div class="ml-3">
                        <p id="user-name" class="text-sm font-medium text-white leading-none truncate w-24">A carregar...</p>
                        <p id="user-role" class="text-xs text-slate-500 mt-1 truncate w-24">Gestor</p>
                    </div>
                </div>
                <button id="logout-btn" class="text-slate-500 hover:text-red-400 transition" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-dark-800 border-b border-dark-700 flex justify-between items-center px-6 shrink-0 z-10">
            <div class="flex items-center space-x-4">
                <h1 class="text-lg font-semibold text-white">Quadro de Intervenções (Kanban)</h1>
            </div>
            <button onclick="addOS()" class="bg-brand hover:bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium shadow-lg shadow-brand/20 transition flex items-center">
                <i class="fas fa-plus mr-2"></i> Criar O.S.
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-dark-800 p-4 rounded-lg border border-dark-700 flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Aguardar Execução</p>
                        <h3 class="text-2xl font-bold text-white mt-1" id="kpi-todo">0</h3>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-dark-900 flex items-center justify-center text-slate-400"><i class="fas fa-inbox"></i></div>
                </div>
                <div class="bg-dark-800 p-4 rounded-lg border border-brand/30 flex items-center justify-between shadow-[0_0_15px_rgba(59,130,246,0.05)]">
                    <div>
                        <p class="text-brand text-xs font-semibold uppercase tracking-wider">Em Andamento</p>
                        <h3 class="text-2xl font-bold text-brand mt-1" id="kpi-doing">0</h3>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-brand/10 flex items-center justify-center text-brand"><i class="fas fa-tools"></i></div>
                </div>
                <div class="bg-dark-800 p-4 rounded-lg border border-red-900/50 flex items-center justify-between">
                    <div>
                        <p class="text-red-400 text-xs font-semibold uppercase tracking-wider">Prioridade Alta (Crítico)</p>
                        <h3 class="text-2xl font-bold text-red-400 mt-1" id="kpi-critical">0</h3>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-500"><i class="fas fa-fire"></i></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-dark-800/50 rounded-lg border border-dark-700 flex flex-col">
                    <div class="p-3 border-b border-dark-700 flex justify-between items-center">
                        <h3 class="font-semibold text-slate-300">A Fazer</h3>
                        <span class="text-xs bg-dark-900 border border-dark-700 px-2 py-0.5 rounded text-slate-400" id="count-todo">0</span>
                    </div>
                    <div id="col-todo" class="kanban-col p-3 space-y-3 overflow-y-auto"></div>
                </div>

                <div class="bg-brand/5 rounded-lg border border-brand/20 flex flex-col relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-brand"></div>
                    <div class="p-3 border-b border-brand/20 flex justify-between items-center">
                        <h3 class="font-semibold text-brand">Em Execução</h3>
                        <span class="text-xs bg-brand/20 border border-brand/30 px-2 py-0.5 rounded text-brand" id="count-doing">0</span>
                    </div>
                    <div id="col-doing" class="kanban-col p-3 space-y-3 overflow-y-auto"></div>
                </div>

                <div class="bg-green-900/10 rounded-lg border border-green-900/30 flex flex-col">
                    <div class="p-3 border-b border-green-900/30 flex justify-between items-center">
                        <h3 class="font-semibold text-green-500">Finalizado</h3>
                        <span class="text-xs bg-green-900/30 border border-green-800/50 px-2 py-0.5 rounded text-green-400" id="count-done">0</span>
                    </div>
                    <div id="col-done" class="kanban-col p-3 space-y-3 overflow-y-auto opacity-75 hover:opacity-100 transition-opacity"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnCmlVVqAMdGhkNIUpzsV-T6X_-pLtuAU",
            authDomain: "nexux-iot-senai.firebaseapp.com",
            databaseURL: "https://nexux-iot-senai-default-rtdb.firebaseio.com",
            projectId: "nexux-iot-senai",
            storageBucket: "nexux-iot-senai.firebasestorage.app",
            messagingSenderId: "307785456493",
            appId: "1:307785456493:web:2d07cea8554893f1681864"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app); 
        const osRef = ref(db, 'work_orders');

        // Perfil & Proteção
        onAuthStateChanged(auth, (user) => {
            if (user) {
                get(child(ref(db), `users/${user.uid}`)).then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        document.getElementById('user-name').innerText = userData.name;
                        document.getElementById('user-role').innerText = userData.role;
                        const photoDiv = document.getElementById('user-photo');
                        if (userData.photoURL && userData.photoURL.trim() !== '') {
                            photoDiv.innerHTML = `<img src="${userData.photoURL}" class="w-full h-full object-cover">`;
                        } else {
                            photoDiv.innerHTML = userData.name.charAt(0).toUpperCase();
                        }
                    }
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logout-btn')?.addEventListener('click', () => signOut(auth));

        // Renderizar Kanban
        onValue(osRef, (snapshot) => {
            const data = snapshot.val();
            
            const cols = {
                todo: document.getElementById('col-todo'),
                doing: document.getElementById('col-doing'),
                done: document.getElementById('col-done')
            };
            
            Object.values(cols).forEach(col => col.innerHTML = '');
            let counts = { todo: 0, doing: 0, done: 0 };
            let criticalCount = 0;

            if (data) {
                Object.entries(data).forEach(([id, task]) => {
                    const status = task.status || 'todo';
                    counts[status]++;
                    if (task.priority === 'Alta' && status !== 'done') criticalCount++;
                    
                    let priorityBadge = task.priority === 'Alta' 
                        ? `<span class="bg-red-500/10 text-red-400 border border-red-500/20 text-xxs px-1.5 py-0.5 rounded font-bold uppercase"><i class="fas fa-fire mr-1"></i>Alta</span>` 
                        : `<span class="bg-dark-900 border border-dark-700 text-slate-400 text-xxs px-1.5 py-0.5 rounded font-bold uppercase">Normal</span>`;
                    
                    let buttonsHTML = '';
                    if (status === 'todo') {
                        buttonsHTML = `<button onclick="updateOsStatus('${id}', 'doing')" class="flex-1 bg-brand hover:bg-blue-600 text-white text-xs py-1.5 rounded transition font-medium">Iniciar O.S.</button>`;
                    } else if (status === 'doing') {
                        buttonsHTML = `<button onclick="updateOsStatus('${id}', 'done')" class="flex-1 bg-green-600 hover:bg-green-500 text-white text-xs py-1.5 rounded transition font-medium">Concluir</button>`;
                    }
                    buttonsHTML += `<button onclick="deleteOs('${id}')" class="bg-dark-900 hover:bg-red-900/50 text-slate-400 hover:text-red-400 border border-dark-700 text-xs px-2.5 py-1.5 rounded transition" title="Eliminar"><i class="fas fa-trash"></i></button>`;

                    const dataCriacao = task.createdAt ? new Date(task.createdAt).toLocaleDateString('pt-PT') : 'N/A';

                    const cardHTML = `
                        <div class="bg-dark-800 p-3 rounded-lg border border-dark-700 shadow-sm hover:border-brand/50 transition-colors group">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-semibold text-slate-400 truncate max-w-[60%]">${task.type}</span>
                                ${priorityBadge}
                            </div>
                            <h4 class="font-bold text-white text-sm mb-2 leading-tight">${task.title}</h4>
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xxs text-slate-500"><i class="far fa-clock mr-1"></i>${dataCriacao}</span>
                                <span class="text-xxs text-slate-500">ID: ${id.substring(1,6).toUpperCase()}</span>
                            </div>
                            <div class="flex gap-2 pt-2 border-t border-dark-700">
                                ${buttonsHTML}
                            </div>
                        </div>
                    `;
                    
                    if (cols[status]) cols[status].innerHTML += cardHTML;
                });
            }

            // Atualiza Contadores e KPIs
            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;

            document.getElementById('kpi-todo').innerText = counts.todo;
            document.getElementById('kpi-doing').innerText = counts.doing;
            document.getElementById('kpi-critical').innerText = criticalCount;
        });

        // Modais SweetAlert2 Tema Escuro
        const swalDarkTheme = { background: '#1e293b', color: '#f8fafc', confirmButtonColor: '#3b82f6', cancelButtonColor: '#ef4444' };

        window.addOS = async () => {
            const { value: formValues } = await Swal.fire({
                title: 'Nova Ordem de Serviço', ...swalDarkTheme,
                html: `
                    <div class="text-left px-4">
                        <label class="text-xs text-slate-400 uppercase font-semibold">Descrição / Título</label>
                        <input id="swal-title" class="swal2-input bg-dark-900 text-white !mt-1" placeholder="Ex: Substituição de rolamento">
                        
                        <label class="text-xs text-slate-400 uppercase font-semibold mt-4 block">Tipo de Intervenção</label>
                        <select id="swal-type" class="swal2-select bg-dark-900 text-white !mt-1">
                            <option value="Manutenção Preventiva">Preventiva</option>
                            <option value="Manutenção Corretiva">Corretiva</option>
                            <option value="Inspeção">Inspeção</option>
                        </select>

                        <label class="text-xs text-slate-400 uppercase font-semibold mt-4 block">Nível de Prioridade</label>
                        <select id="swal-priority" class="swal2-select bg-dark-900 text-white !mt-1">
                            <option value="Normal">Normal</option>
                            <option value="Alta">Alta (Crítico)</option>
                        </select>
                    </div>
                `,
                showCancelButton: true, cancelButtonText: 'Cancelar', confirmButtonText: 'Registar O.S.',
                preConfirm: () => {
                    const title = document.getElementById('swal-title').value;
                    if(!title) { Swal.showValidationMessage('O título é obrigatório'); return false; }
                    return {
                        title: title,
                        type: document.getElementById('swal-type').value,
                        priority: document.getElementById('swal-priority').value,
                        status: 'todo',
                        createdAt: Date.now()
                    }
                }
            });
            if (formValues) {
                push(osRef, formValues);
                Swal.fire({ title: 'O.S. Registada!', icon: 'success', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false, ...swalDarkTheme });
            }
        };

        window.updateOsStatus = (id, newStatus) => { update(ref(db, 'work_orders/' + id), { status: newStatus }); };

        window.deleteOs = (id) => {
            Swal.fire({ title: 'Eliminar O.S.?', text: "Este registo será apagado permanentemente.", icon: 'warning', showCancelButton: true, confirmButtonText: 'Sim, eliminar', cancelButtonText: 'Cancelar', ...swalDarkTheme })
            .then((r) => { if(r.isConfirmed) remove(ref(db, 'work_orders/' + id)); });
        };
    </script>
</body>
</html>
