<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Industrial - Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }, brand: '#3b82f6' } } }
        }
    </script>
</head>
<body class="bg-[#0b1120] text-slate-300 font-sans h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-800 rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>

    <div class="w-full max-w-md bg-dark-800 p-8 rounded-xl shadow-2xl border border-dark-700 z-10">
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-brand/10 text-brand mb-4">
                <i class="fas fa-layer-group text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wider">NEXUS<span class="font-light text-slate-400">MGMT</span></h1>
        </div>

        <div class="flex mb-6 bg-dark-900 rounded-lg p-1">
            <button id="tab-login" class="flex-1 py-2 text-sm font-medium rounded-md bg-dark-700 text-white transition">Entrar</button>
            <button id="tab-register" class="flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition">Criar Conta</button>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">E-mail Corporativo</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-2.5 text-slate-500 text-sm"></i>
                    <input type="email" id="log-email" required class="w-full bg-dark-900 border border-dark-700 text-white rounded-md py-2 pl-9 pr-3 focus:outline-none focus:border-brand transition text-sm">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Palavra-passe</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-2.5 text-slate-500 text-sm"></i>
                    <input type="password" id="log-password" required class="w-full bg-dark-900 border border-dark-700 text-white rounded-md py-2 pl-9 pr-3 focus:outline-none focus:border-brand transition text-sm">
                </div>
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-blue-600 text-white font-medium py-2 rounded-md transition text-sm shadow-lg shadow-brand/20 mt-4">
                Aceder ao Sistema
            </button>
        </form>

        <form id="registerForm" class="space-y-4 hidden">
            <div class="flex flex-col items-center mb-4">
                <div class="relative group cursor-pointer" onclick="document.getElementById('reg-photo').click()">
                    <img id="photo-preview" src="https://ui-avatars.com/api/?name=Novo+User&background=334155&color=fff" class="w-16 h-16 rounded-full border-2 border-dark-700 object-cover group-hover:border-brand transition">
                    <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <i class="fas fa-camera text-white text-xs"></i>
                    </div>
                </div>
                <input type="file" id="reg-photo" accept="image/*" class="hidden">
                <p class="text-xxs text-slate-500 mt-1">Clique para adicionar foto</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome</label>
                    <input type="text" id="reg-name" required class="w-full bg-dark-900 border border-dark-700 text-white rounded-md py-1.5 px-3 focus:border-brand transition text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Cargo</label>
                    <select id="reg-role" class="w-full bg-dark-900 border border-dark-700 text-white rounded-md py-1.5 px-3 focus:border-brand transition text-sm">
                        <option value="Gestor">Gestor</option>
                        <option value="Engenheiro">Engenheiro</option>
                        <option value="Técnico Lider">Técnico Líder</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">E-mail Corporativo</label>
                <input type="email" id="reg-email" required class="w-full bg-dark-900 border border-dark-700 text-white rounded-md py-1.5 px-3 focus:border-brand transition text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Palavra-passe (Min. 6 carateres)</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full bg-dark-900 border border-dark-700 text-white rounded-md py-1.5 px-3 focus:border-brand transition text-sm">
            </div>
            <button type="submit" class="w-full bg-dark-700 hover:bg-dark-600 border border-dark-600 text-white font-medium py-2 rounded-md transition text-sm mt-4">
                Criar Conta
            </button>
        </form>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnCmlVVqAMdGhkNIUpzsV-T6X_-pLtuAU",
            authDomain: "nexux-iot-senai.firebaseapp.com",
            databaseURL: "https://nexux-iot-senai-default-rtdb.firebaseio.com",
            projectId: "nexux-iot-senai"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Lógica de Tabs (Alternar Login/Registo)
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formLogin = document.getElementById('loginForm');
        const formRegister = document.getElementById('registerForm');

        tabLogin.addEventListener('click', () => {
            tabLogin.className = "flex-1 py-2 text-sm font-medium rounded-md bg-dark-700 text-white transition";
            tabRegister.className = "flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition";
            formLogin.classList.remove('hidden');
            formRegister.classList.add('hidden');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.className = "flex-1 py-2 text-sm font-medium rounded-md bg-dark-700 text-white transition";
            tabLogin.className = "flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition";
            formRegister.classList.remove('hidden');
            formLogin.classList.add('hidden');
        });

        // Leitura e Compressão da Foto de Perfil (Custo Zero)
        document.getElementById('reg-photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        // 1. Cria um "Canvas" virtual (invisível) para manipular a imagem
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // 2. Define o tamanho máximo perfeito para uma foto de perfil
                        const MAX_SIZE = 150;
                        let width = img.width;
                        let height = img.height;
                        
                        // Calcula a proporção correta
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        // 3. Desenha a imagem em miniatura no canvas
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 4. Converte para JPEG comprimido (70% de qualidade) em Base64 hiper-leve!
                        base64Photo = canvas.toDataURL('image/jpeg', 0.7);
                        
                        // Atualiza a bolinha de pré-visualização na tela
                        const preview = document.getElementById('photo-preview');
                        if (preview) {
                            preview.src = base64Photo;
                            preview.classList.remove('hidden');
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        const swalTheme = { background: '#1e293b', color: '#fff', confirmButtonColor: '#3b82f6' };

        // Submissão do LOGIN
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            // O .trim() remove os espaços acidentais no fim do e-mail
            const email = document.getElementById('log-email').value.trim(); 
            const password = document.getElementById('log-password').value;

            try {
                Swal.fire({ title: 'A autenticar...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }, ...swalTheme });
                await signInWithEmailAndPassword(auth, email, password);
                
                // Login bem sucedido, redireciona
                window.location.href = 'menu.html';
                
            } catch (error) {
                // Aqui o sistema captura o erro exato da API
                console.error("Erro da API do Firebase:", error);
                
                let errorMsg = 'Verifique o e-mail e a palavra-passe.';
                if (error.code === 'auth/invalid-credential') errorMsg = 'E-mail ou palavra-passe incorretos.';
                if (error.code === 'auth/user-not-found') errorMsg = 'Este utilizador não existe. Crie uma conta primeiro.';
                if (error.code === 'auth/wrong-password') errorMsg = 'A palavra-passe está errada.';
                if (error.code === 'auth/too-many-requests') errorMsg = 'Conta temporariamente bloqueada por muitas tentativas.';

                Swal.fire({ icon: 'error', title: 'Acesso Negado', text: errorMsg, ...swalTheme });
            }
        });

        // Submissão do REGISTO
        formRegister.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            const role = document.getElementById('reg-role').value;

            try {
                Swal.fire({ title: 'A criar perfil...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }, ...swalTheme });
                
                // Cria Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Salva Dados Base64 no Database
                await set(ref(db, 'users/' + user.uid), {
                    name: name,
                    role: role,
                    photoURL: base64Photo, // Guarda a string Base64 diretamente como no seu código antigo
                    email: email,
                    createdAt: Date.now()
                });

                Swal.fire({ icon: 'success', title: 'Conta Criada!', text: 'Bem-vindo ao Nexus.', timer: 1500, showConfirmButton: false, ...swalTheme })
                .then(() => { window.location.href = 'menu.html'; });

            } catch (error) {
                let errorMsg = "Erro ao criar conta.";
                if(error.code === 'auth/email-already-in-use') errorMsg = "Este e-mail já está em uso.";
                Swal.fire({ icon: 'error', title: 'Erro', text: errorMsg, ...swalTheme });
            }
        });
    </script>
</body>

</html>
